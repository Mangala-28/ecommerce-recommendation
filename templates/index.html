<!DOCTYPE html>
<html>
<head>
    <title>E-commerce Recommendation System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f6f8;
        }

        h1 {
            margin-top: 40px;
        }

        .container {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            width: 80%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .results {
            margin-top: 20px;
        }

        .card {
            background: #e9f3ff;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>🛒 E-commerce Recommendation System</h1>

    <div class="container">

        <form method="POST">
            <input type="text" name="user_id" placeholder="Enter User ID (e.g. U0103)" required>
            <br>
            <button type="submit">Get Recommendations</button>
        </form>

        {% if recommendations %}
        <div class="results">
            <h2>🎯 Recommendations:</h2>

            {% for key, value in recommendations.items() %}
                <div class="card">
                    <strong>{{ key }}</strong> → Rating: {{ value }}
                </div>
            {% endfor %}

        </div>
        {% endif %}

    </div>

</body>
</html>
